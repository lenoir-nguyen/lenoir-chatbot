version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: lenoir-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lenoir-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lenoir-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - lenoir-network

volumes:
  redis_data:

networks:
  lenoir-network:
    driver: bridge
